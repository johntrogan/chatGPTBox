name: pr-tests

on:
  pull_request:
    types:
      - "opened"
      - "reopened"
      - "synchronize"
    paths:
      - "src/**"
      - "safari/**"
      - "build.mjs"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/scripts/**"
      - ".github/workflows/pr-tests.yml"
      - ".github/workflows/tagged-release.yml"
  push:
    branches:
      - "master"
    paths:
      - "src/**"
      - "safari/**"
      - "build.mjs"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/scripts/**"
      - ".github/workflows/pr-tests.yml"
      - ".github/workflows/tagged-release.yml"

jobs:
  tests:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run lint
      - run: npm run build

  safari-build:
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.2
      - run: npm ci
      - run: npm run build:safari
      - name: Verify Safari build artifacts
        shell: bash
        run: |
          set -eo pipefail
          shopt -s nullglob
          apps=(build/*.app)

          if [ "${#apps[@]}" -ne 1 ]; then
            echo "Expected exactly one Safari app bundle, found ${#apps[@]}"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${apps[0]}"
          test -s build/safari.dmg
          hdiutil verify build/safari.dmg

  update_coverage_badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [tests, safari-build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:coverage
      - run: node .github/workflows/scripts/update-coverage-badge.mjs
      - name: Commit coverage badge
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          max_retries=3

          if git diff --quiet -- badges/coverage.json; then
            echo "Coverage badge unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          git commit -m "Update coverage badge [skip ci]"

          for attempt in $(seq 1 "${max_retries}"); do
            echo "Attempt ${attempt}/${max_retries}: pushing coverage badge update to ${branch}"

            if git push origin "HEAD:${branch}"; then
              echo "Coverage badge push succeeded"
              exit 0
            fi

            if [ "${attempt}" -eq "${max_retries}" ]; then
              echo "::warning::Failed to push coverage badge after ${max_retries} attempts due to concurrent updates. Skipping without failing CI."
              exit 0
            fi

            echo "Push rejected. Fetching latest origin/${branch} and retrying with rebase..."
            if ! git fetch origin "${branch}"; then
              echo "::warning::Failed to fetch origin/${branch} while retrying coverage badge push. Skipping without failing CI."
              exit 0
            fi

            if ! git rebase "origin/${branch}"; then
              git rebase --abort || true
              echo "::warning::Rebase conflict while retrying coverage badge push. Skipping without failing CI."
              exit 0
            fi

            sleep $((attempt * 2))
          done
